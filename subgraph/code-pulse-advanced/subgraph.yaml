specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: CodePulseAdvanced
    network: sepolia
    source:
      address: "0x3100b1FD5A2180dAc11820106579545D0f1C439b"
      abi: CodePulseAdvanced
      startBlock: 10643717
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - CampaignFinalized
        - CrowdfundingLaunched
        - DeveloperAdded
        - DeveloperRemoved
        - Donated
        - FundingRoundReviewed
        - FundingRoundSubmittedForReview
        - MilestoneApproved
        - MilestoneShareClaimed
        - OwnershipTransferred
        - Paused
        - PlatformDonated
        - PlatformFundsWithdrawn
        - ProposalInitiatorUpdated
        - ProposalReviewed
        - ProposalSubmitted
        - RefundClaimed
        - StaleFundsSwept
        - Unpaused
      abis:
        - name: CodePulseAdvanced
          file: ./abis/CodePulseAdvanced.json
      eventHandlers:
        - event: CampaignFinalized(indexed uint256,bool)
          handler: handleCampaignFinalized
        - event: CrowdfundingLaunched(indexed uint256,indexed uint256,indexed address,bytes32,string,uint256,uint256,uint256)
          handler: handleCrowdfundingLaunched
        - event: DeveloperAdded(indexed uint256,indexed address)
          handler: handleDeveloperAdded
        - event: DeveloperRemoved(indexed uint256,indexed address)
          handler: handleDeveloperRemoved
        - event: Donated(indexed uint256,indexed address,uint256)
          handler: handleDonated
        - event: FundingRoundReviewed(indexed uint256,bool)
          handler: handleFundingRoundReviewed
        - event: FundingRoundSubmittedForReview(indexed uint256,uint256)
          handler: handleFundingRoundSubmittedForReview
        - event: MilestoneApproved(indexed uint256,uint256)
          handler: handleMilestoneApproved
        - event: MilestoneShareClaimed(indexed uint256,indexed uint256,indexed address,uint256)
          handler: handleMilestoneShareClaimed
        - event: OwnershipTransferred(indexed address,indexed address)
          handler: handleOwnershipTransferred
        - event: Paused(address)
          handler: handlePaused
        - event: PlatformDonated(indexed address,uint256)
          handler: handlePlatformDonated
        - event: PlatformFundsWithdrawn(indexed address,uint256)
          handler: handlePlatformFundsWithdrawn
        - event: ProposalInitiatorUpdated(indexed address,bool)
          handler: handleProposalInitiatorUpdated
        - event: ProposalReviewed(indexed uint256,bool)
          handler: handleProposalReviewed
        - event: ProposalSubmitted(indexed uint256,indexed address,string,uint256,uint256)
          handler: handleProposalSubmitted
        - event: RefundClaimed(indexed uint256,indexed address,uint256)
          handler: handleRefundClaimed
        - event: StaleFundsSwept(indexed uint256,uint256)
          handler: handleStaleFundsSwept
        - event: Unpaused(address)
          handler: handleUnpaused
      file: ./src/code-pulse-advanced.ts
