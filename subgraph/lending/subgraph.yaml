specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: Pool
    network: base-sepolia
    source:
      address: "0x3f0248e6fF7E414485A146C18d6B72Dc9E317E5F"
      abi: Pool
      startBlock: 40633889
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Borrow
        - LiquidationCall
        - Paused
        - ProtocolFeeRecipientUpdated
        - Repay
        - ReserveCapsUpdated
        - ReserveInitialized
        - EModeCategoryConfigured
        - ReserveLiquidationProtocolFeeUpdated
        - Supply
        - Unpaused
        - UserEModeSet
        - Withdraw
      abis:
        - name: Pool
          file: ./abis/Pool.json
      eventHandlers:
        - event: Borrow(indexed address,indexed address,uint256)
          handler: handleBorrow
        - event: LiquidationCall(indexed address,indexed address,indexed
            address,address,uint256,uint256,uint256)
          handler: handleLiquidationCall
        - event: Paused(address)
          handler: handlePaused
        - event: ProtocolFeeRecipientUpdated(indexed address)
          handler: handleProtocolFeeRecipientUpdated
        - event: Repay(indexed address,indexed address,uint256)
          handler: handleRepay
        - event: ReserveCapsUpdated(indexed address,uint256,uint256)
          handler: handleReserveCapsUpdated
        - event: ReserveInitialized(indexed address,indexed address,indexed
            address,address,uint256,uint256,uint256,uint256,uint256)
          handler: handleReserveInitialized
        - event: EModeCategoryConfigured(indexed uint8,uint256,uint256,uint256,string)
          handler: handleEModeCategoryConfigured
        - event: ReserveLiquidationProtocolFeeUpdated(indexed address,uint256)
          handler: handleReserveLiquidationProtocolFeeUpdated
        - event: Supply(indexed address,indexed address,uint256)
          handler: handleSupply
        - event: Unpaused(address)
          handler: handleUnpaused
        - event: UserEModeSet(indexed address,uint8)
          handler: handleUserEModeSet
        - event: Withdraw(indexed address,indexed address,uint256)
          handler: handleWithdraw
      file: ./src/pool.ts
  - kind: ethereum
    name: HybridPriceOracle
    network: base-sepolia
    source:
      address: "0xE72Ac9c1D557d65094aE92739e409cA56AE12B11"
      abi: HybridPriceOracle
      startBlock: 40633889
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - OwnershipTransferred
        - StreamConfigUpdated
        - StreamPriceFallbackToFeed
        - HybridPoolSet
      abis:
        - name: HybridPriceOracle
          file: ./abis/HybridPriceOracle.json
      eventHandlers:
        - event: OwnershipTransferred(indexed address,indexed address)
          handler: handleOwnershipTransferred
        - event: PoolSet(indexed address)
          handler: handlePoolSet
        - event: StreamConfigUpdated(indexed address,indexed bytes32,uint8)
          handler: handleStreamConfigUpdated
        - event: StreamPriceFallbackToFeed(indexed address)
          handler: handleStreamPriceFallbackToFeed
      file: ./src/hybrid-price-oracle.ts
  - kind: ethereum
    name: ReportsVerifier
    network: base-sepolia
    source:
      address: "0x960e004f33566D0B56863F54532F1785923d2799"
      abi: ReportsVerifier
      startBlock: 40633889
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - OwnershipTransferred
        - AuthorizedOracleSet
        - VerifierTokenSwept
        - VerifierNativeSwept
      abis:
        - name: ReportsVerifier
          file: ./abis/ReportsVerifier.json
      eventHandlers:
        - event: OwnershipTransferred(indexed address,indexed address)
          handler: handleOwnershipTransferred
        - event: AuthorizedOracleSet(indexed address)
          handler: handleAuthorizedOracleSet
        - event: TokenSwept(indexed address,indexed address,uint256)
          handler: handleTokenSwept
        - event: NativeSwept(indexed address,uint256)
          handler: handleNativeSwept
      file: ./src/reports-verifier.ts
  - kind: ethereum
    name: InterestRateStrategyFactory
    network: base-sepolia
    source:
      address: "0xB44D1c69EaF762441d6762e094B18d2614CF1617"
      abi: InterestRateStrategyFactory
      startBlock: 40633889
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - OwnershipTransferred
        - InterestRateStrategyCreated
      abis:
        - name: InterestRateStrategyFactory
          file: ./abis/InterestRateStrategyFactory.json
      eventHandlers:
        - event: OwnershipTransferred(indexed address,indexed address)
          handler: handleOwnershipTransferred
        - event: StrategyCreated(indexed address,indexed uint256,uint256,uint256,uint256,uint256,uint256)
          handler: handleStrategyCreated
      file: ./src/interest-rate-strategy-factory.ts
  - kind: ethereum
    name: InterestRateStrategy
    network: base-sepolia
    source:
      address: "0x0f4C88d757e370016B5cfC1ac48d013378BE4a27"
      abi: InterestRateStrategy
      startBlock: 40633889
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - InterestRateStrategyImmutableParams
        - InterestRateStrategyDeployed
      abis:
        - name: InterestRateStrategy
          file: ./abis/InterestRateStrategy.json
      blockHandlers:
        - handler: handleInterestRateStrategyInit
          filter:
            kind: once
      eventHandlers:
        - event: InterestRateStrategyDeployed(uint256,uint256,uint256,uint256,uint256)
          handler: handleInterestRateStrategyDeployed
      file: ./src/interest-rate-strategy.ts
  - kind: ethereum
    name: ChainlinkPriceOracle
    network: base-sepolia
    source:
      address: "0x3100b1FD5A2180dAc11820106579545D0f1C439b"
      abi: ChainlinkPriceOracle
      startBlock: 40633889
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - OwnershipTransferred
        - ChainlinkFeedSet
      abis:
        - name: ChainlinkPriceOracle
          file: ./abis/ChainlinkPriceOracle.json
      eventHandlers:
        - event: OwnershipTransferred(indexed address,indexed address)
          handler: handleOwnershipTransferred
        - event: FeedSet(indexed address,indexed address,uint256)
          handler: handleFeedSet
      file: ./src/chainlink-price-oracle.ts
templates:
  - name: AToken
    kind: ethereum/contract
    network: base-sepolia
    source:
      abi: AToken
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - ATokenMint
        - ATokenBurn
      abis:
        - name: AToken
          file: ./abis/AToken.json
      eventHandlers:
        - event: Mint(indexed address,uint256)
          handler: handleATokenMint
        - event: Burn(indexed address,uint256)
          handler: handleATokenBurn
      file: ./src/a-token.ts
  - name: VariableDebtToken
    kind: ethereum/contract
    network: base-sepolia
    source:
      abi: VariableDebtToken
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - VariableDebtTokenMint
        - VariableDebtTokenBurn
      abis:
        - name: VariableDebtToken
          file: ./abis/VariableDebtToken.json
      eventHandlers:
        - event: Mint(indexed address,uint256)
          handler: handleVariableDebtTokenMint
        - event: Burn(indexed address,uint256)
          handler: handleVariableDebtTokenBurn
      file: ./src/variable-debt-token.ts
