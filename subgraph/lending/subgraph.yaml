specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: Pool
    network: base-sepolia
    source:
      address: "0x65213B004b54DeA6CB1096794CA3f1C24066B0ff"
      abi: Pool
      startBlock: 40591406
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Borrow
        - LiquidationCall
        - Paused
        - ProtocolFeeRecipientUpdated
        - Repay
        - ReserveCapsUpdated
        - ReserveLiquidationProtocolFeeUpdated
        - Supply
        - Unpaused
        - UserEModeSet
        - Withdraw
      abis:
        - name: Pool
          file: ./abis/Pool.json
      eventHandlers:
        - event: Borrow(indexed address,indexed address,uint256)
          handler: handleBorrow
        - event: LiquidationCall(indexed address,indexed address,indexed
            address,address,uint256,uint256,uint256)
          handler: handleLiquidationCall
        - event: Paused(address)
          handler: handlePaused
        - event: ProtocolFeeRecipientUpdated(indexed address)
          handler: handleProtocolFeeRecipientUpdated
        - event: Repay(indexed address,indexed address,uint256)
          handler: handleRepay
        - event: ReserveCapsUpdated(indexed address,uint256,uint256)
          handler: handleReserveCapsUpdated
        - event: ReserveLiquidationProtocolFeeUpdated(indexed address,uint256)
          handler: handleReserveLiquidationProtocolFeeUpdated
        - event: Supply(indexed address,indexed address,uint256)
          handler: handleSupply
        - event: Unpaused(address)
          handler: handleUnpaused
        - event: UserEModeSet(indexed address,uint8)
          handler: handleUserEModeSet
        - event: Withdraw(indexed address,indexed address,uint256)
          handler: handleWithdraw
      file: ./src/pool.ts
  - kind: ethereum
    name: HybridPriceOracle
    network: base-sepolia
    source:
      address: "0x37a8224BB0ea0828051adF9569967b4e8d0e1f49"
      abi: HybridPriceOracle
      startBlock: 40591392
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - OwnershipTransferred
        - StreamConfigUpdated
        - StreamPriceFallbackToFeed
      abis:
        - name: HybridPriceOracle
          file: ./abis/HybridPriceOracle.json
      eventHandlers:
        - event: OwnershipTransferred(indexed address,indexed address)
          handler: handleOwnershipTransferred
        - event: StreamConfigUpdated(indexed address,indexed bytes32,uint8)
          handler: handleStreamConfigUpdated
        - event: StreamPriceFallbackToFeed(indexed address)
          handler: handleStreamPriceFallbackToFeed
      file: ./src/hybrid-price-oracle.ts
  - kind: ethereum
    name: ReportsVerifier
    network: base-sepolia
    source:
      address: "0xDaAD54b34D4db3FdB0DDDF1aD37316fF862f9ab8"
      abi: ReportsVerifier
      startBlock: 40591385
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - OwnershipTransferred
      abis:
        - name: ReportsVerifier
          file: ./abis/ReportsVerifier.json
      eventHandlers:
        - event: OwnershipTransferred(indexed address,indexed address)
          handler: handleOwnershipTransferred
      file: ./src/reports-verifier.ts
  - kind: ethereum
    name: InterestRateStrategyFactory
    network: base-sepolia
    source:
      address: "0x7F3d525A1781e295a2AB9Aa74C18F28b984DFa74"
      abi: InterestRateStrategyFactory
      startBlock: 40591382
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - OwnershipTransferred
        - InterestRateStrategyCreated
      abis:
        - name: InterestRateStrategyFactory
          file: ./abis/InterestRateStrategyFactory.json
      eventHandlers:
        - event: OwnershipTransferred(indexed address,indexed address)
          handler: handleOwnershipTransferred
        - event: StrategyCreated(indexed address,indexed uint256,uint256,uint256,uint256,uint256,uint256)
          handler: handleStrategyCreated
      file: ./src/interest-rate-strategy-factory.ts
  - kind: ethereum
    name: InterestRateStrategy
    network: base-sepolia
    source:
      address: "0x9B91E7fa1E37d32C93f1bd1EcB7be991b53112A3"
      abi: InterestRateStrategy
      startBlock: 40591380
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - InterestRateStrategyImmutableParams
      abis:
        - name: InterestRateStrategy
          file: ./abis/InterestRateStrategy.json
      blockHandlers:
        - handler: handleInterestRateStrategyInit
          filter:
            kind: once
      file: ./src/interest-rate-strategy.ts
  - kind: ethereum
    name: ChainlinkPriceOracle
    network: base-sepolia
    source:
      address: "0xF48E792DdA21F978740DF4Acb999C22e84A9Ae6c"
      abi: ChainlinkPriceOracle
      startBlock: 40591377
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - OwnershipTransferred
      abis:
        - name: ChainlinkPriceOracle
          file: ./abis/ChainlinkPriceOracle.json
      eventHandlers:
        - event: OwnershipTransferred(indexed address,indexed address)
          handler: handleOwnershipTransferred
      file: ./src/chainlink-price-oracle.ts
