type InterestRateStrategyCreated @entity(immutable: true) {
  id: Bytes!
  factory: Bytes! # address
  strategy: Bytes! # address
  strategyIndex: BigInt! # factory id
  optimalUtilization: BigInt!
  baseBorrowRate: BigInt!
  slope1: BigInt!
  slope2: BigInt!
  reserveFactor: BigInt!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

# Snapshot from on-chain getters (InterestRateStrategy emits no events; indexed once at startBlock).
type InterestRateStrategyImmutableParams @entity(immutable: true) {
  id: Bytes! # strategy contract address
  optimalUtilization: BigInt!
  baseBorrowRate: BigInt!
  slope1: BigInt!
  slope2: BigInt!
  reserveFactor: BigInt!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
}
