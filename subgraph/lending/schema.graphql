type Borrow @entity(immutable: true) {
  id: Bytes!
  asset: Bytes! # address
  user: Bytes! # address
  amount: BigInt! # uint256
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type LiquidationCall @entity(immutable: true) {
  id: Bytes!
  collateralAsset: Bytes! # address
  debtAsset: Bytes! # address
  borrower: Bytes! # address
  liquidator: Bytes! # address
  debtCovered: BigInt! # uint256
  collateralToLiquidator: BigInt! # uint256
  collateralProtocolFee: BigInt! # uint256
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

