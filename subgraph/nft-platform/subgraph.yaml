specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: NFTTemplate
    network: sepolia
    source:
      address: "0xcbBF6cd8D652289A91dc560944108aD962a69599"
      abi: NFTTemplate
      startBlock: 10683724
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Approval
        - ApprovalForAll
        - BaseURIUpdated
        - DefaultRoyaltyUpdated
        - Initialized
        - OwnershipTransferred
        - Transfer
      abis:
        - name: NFTTemplate
          file: ./abis/NFTTemplate.json
      eventHandlers:
        - event: Approval(indexed address,indexed address,indexed uint256)
          handler: handleApproval
        - event: ApprovalForAll(indexed address,indexed address,bool)
          handler: handleApprovalForAll
        - event: BaseURIUpdated(string)
          handler: handleBaseURIUpdated
        - event: DefaultRoyaltyUpdated(indexed address,uint96)
          handler: handleDefaultRoyaltyUpdated
        - event: Initialized(uint64)
          handler: handleInitialized
        - event: OwnershipTransferred(indexed address,indexed address)
          handler: handleOwnershipTransferred
        - event: Transfer(indexed address,indexed address,indexed uint256)
          handler: handleTransfer
      file: ./src/nft-template.ts
