specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: MultiAssetBank
    network: sepolia
    source:
      address: "0x668A7A8372C41EE0be46a4eA34e6eafeaA4E9748"
      abi: MultiAssetBank
      startBlock: 10616456
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Deposited
        - OwnershipTransferred
        - SurplusETHSwept
        - WithdrawPauseSet
        - Withdrawn
      abis:
        - name: MultiAssetBank
          file: ./abis/MultiAssetBank.json
      eventHandlers:
        - event: Deposited(indexed address,indexed address,uint256)
          handler: handleDeposited
        - event: OwnershipTransferred(indexed address,indexed address)
          handler: handleOwnershipTransferred
        - event: SurplusETHSwept(indexed address,uint256)
          handler: handleSurplusETHSwept
        - event: WithdrawPauseSet(bool)
          handler: handleWithdrawPauseSet
        - event: Withdrawn(indexed address,indexed address,uint256)
          handler: handleWithdrawn
      file: ./src/multi-asset-bank.ts
