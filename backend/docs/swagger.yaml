basePath: /
definitions:
  codepulse.ActionCheckReq:
    properties:
      action:
        type: string
      campaign_id:
        type: integer
      milestone_index:
        type: integer
      params: {}
      proposal_id:
        type: integer
      wallet:
        type: string
    required:
    - action
    - wallet
    type: object
  codepulse.ActionCheckResp:
    properties:
      advisory_code:
        description: AdvisoryCode / AdvisoryMessage 为不阻止交易的补充说明（如撤销 initiator 对已有
          organizer 提案的影响）。
        type: string
      advisory_message:
        type: string
      allowed:
        type: boolean
      current_state:
        type: string
      reason_code:
        type: string
      reason_message:
        type: string
      required_role:
        type: string
      revert_error_args: {}
      revert_error_name:
        type: string
    type: object
  codepulse.TxBuildReq:
    properties:
      action:
        type: string
      params:
        additionalProperties: {}
        type: object
      wallet:
        type: string
    required:
    - action
    - wallet
    type: object
  handlers.APIInfoResp:
    properties:
      name:
        example: go-chain API
        type: string
      version:
        example: 0.1.0
        type: string
    type: object
  handlers.BankDepositsResp:
    properties:
      deposits:
        items:
          $ref: '#/definitions/models.BankDeposit'
        type: array
    type: object
  handlers.BankWithdrawalsResp:
    properties:
      withdrawals:
        items:
          $ref: '#/definitions/models.BankWithdrawal'
        type: array
    type: object
  handlers.ChainStatusResp:
    properties:
      chain_id:
        type: integer
      configured:
        type: boolean
      message:
        type: string
    type: object
  handlers.CounterIncrementResp:
    properties:
      tx_hash:
        type: string
    type: object
  handlers.CounterValueResp:
    properties:
      value:
        type: string
    type: object
  handlers.ErrorJSON:
    properties:
      error:
        type: string
    type: object
  handlers.HealthResp:
    properties:
      status:
        example: ok
        type: string
    type: object
  handlers.SubgraphDepositsResp:
    properties:
      deposits:
        items:
          $ref: '#/definitions/handlers.SubgraphEventRow'
        type: array
      source:
        example: subgraph
        type: string
    type: object
  handlers.SubgraphEventRow:
    properties:
      amount_raw:
        type: string
      block_number:
        type: integer
      block_time:
        type: string
      subgraph_entity_id:
        type: string
      token_address:
        type: string
      tx_hash:
        type: string
      user_address:
        type: string
    type: object
  handlers.SubgraphWithdrawalsResp:
    properties:
      source:
        example: subgraph
        type: string
      withdrawals:
        items:
          $ref: '#/definitions/handlers.SubgraphEventRow'
        type: array
    type: object
  models.BankDeposit:
    properties:
      amount_raw:
        type: string
      block_number:
        type: integer
      block_time:
        type: string
      chain_id:
        type: integer
      created_at:
        type: string
      id:
        type: integer
      log_index:
        type: integer
      token_address:
        type: string
      tx_hash:
        type: string
      user_address:
        type: string
    type: object
  models.BankWithdrawal:
    properties:
      amount_raw:
        type: string
      block_number:
        type: integer
      block_time:
        type: string
      chain_id:
        type: integer
      created_at:
        type: string
      id:
        type: integer
      log_index:
        type: integer
      token_address:
        type: string
      tx_hash:
        type: string
      user_address:
        type: string
    type: object
info:
  contact: {}
  description: 'REST API: health, chain status, counter contract calls, bank ledger
    (PostgreSQL indexer + optional The Graph subgraph). Code Pulse: PostgreSQL is
    filled by RPC log indexer by default; subgraph sync to DB is optional. NFT: RPC
    indexer writes factory/market/collection events to PostgreSQL (005_nft_platform);
    list endpoints may still prefer The Graph when configured; subgraph is not persisted
    to PostgreSQL.'
  title: go-chain API
  version: 0.1.0
paths:
  /api/bank/deposits:
    get:
      description: Lists `Deposited` events stored by the local bank indexer. Optional
        filter by user wallet.
      parameters:
      - default: 50
        description: Max rows (default 50, max 200)
        in: query
        maximum: 200
        minimum: 1
        name: limit
        type: integer
      - description: Filter by user address (0x...), case-insensitive match
        in: query
        name: user
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.BankDepositsResp'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorJSON'
        "503":
          description: database not configured
          schema:
            $ref: '#/definitions/handlers.ErrorJSON'
      summary: Bank deposits (indexed DB)
      tags:
      - bank
  /api/bank/subgraph/deposits:
    get:
      description: Queries the configured subgraph for `Deposited` entities. Requires
        SUBGRAPH_URL (and optional SUBGRAPH_API_KEY).
      parameters:
      - description: Wallet address (0x-prefixed)
        example: 0xd8dA6BF26964aF9D7eEd9e03E53415D37aA96045
        in: query
        name: user
        required: true
        type: string
      - default: 50
        description: Max rows (default 50, max 200)
        in: query
        maximum: 200
        minimum: 1
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.SubgraphDepositsResp'
        "400":
          description: missing or invalid user
          schema:
            $ref: '#/definitions/handlers.ErrorJSON'
        "502":
          description: subgraph HTTP or parse error
          schema:
            $ref: '#/definitions/handlers.ErrorJSON'
        "503":
          description: subgraph not configured
          schema:
            $ref: '#/definitions/handlers.ErrorJSON'
      summary: Bank deposits (The Graph)
      tags:
      - bank
  /api/bank/subgraph/withdrawals:
    get:
      description: Queries the configured subgraph for `Withdrawn` entities. Requires
        SUBGRAPH_URL (and optional SUBGRAPH_API_KEY).
      parameters:
      - description: Wallet address (0x-prefixed)
        example: 0xd8dA6BF26964aF9D7eEd9e03E53415D37aA96045
        in: query
        name: user
        required: true
        type: string
      - default: 50
        description: Max rows (default 50, max 200)
        in: query
        maximum: 200
        minimum: 1
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.SubgraphWithdrawalsResp'
        "400":
          description: missing or invalid user
          schema:
            $ref: '#/definitions/handlers.ErrorJSON'
        "502":
          description: subgraph HTTP or parse error
          schema:
            $ref: '#/definitions/handlers.ErrorJSON'
        "503":
          description: subgraph not configured
          schema:
            $ref: '#/definitions/handlers.ErrorJSON'
      summary: Bank withdrawals (The Graph)
      tags:
      - bank
  /api/bank/withdrawals:
    get:
      description: Lists `Withdrawn` events stored by the local bank indexer. Optional
        filter by user wallet.
      parameters:
      - default: 50
        description: Max rows (default 50, max 200)
        in: query
        maximum: 200
        minimum: 1
        name: limit
        type: integer
      - description: Filter by user address (0x...), case-insensitive match
        in: query
        name: user
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.BankWithdrawalsResp'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorJSON'
        "503":
          description: database not configured
          schema:
            $ref: '#/definitions/handlers.ErrorJSON'
      summary: Bank withdrawals (indexed DB)
      tags:
      - bank
  /api/chain/status:
    get:
      description: 'When ETH_RPC_URL is configured and dial succeeds, returns `configured:
        true` and `chain_id`. Otherwise `configured: false` and a short message.'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.ChainStatusResp'
        "503":
          description: e.g. chain id read failed
          schema:
            $ref: '#/definitions/handlers.ErrorJSON'
      summary: Chain status
      tags:
      - chain
  /api/code-pulse/actions/check:
    post:
      consumes:
      - application/json
      parameters:
      - description: Action check request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/codepulse.ActionCheckReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/codepulse.ActionCheckResp'
      summary: Action pre-check
      tags:
      - code-pulse
  /api/code-pulse/admin/dashboard:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Admin dashboard
      tags:
      - code-pulse
  /api/code-pulse/admin/events:
    get:
      produces:
      - application/json
      responses: {}
      summary: List indexed event log (admin)
      tags:
      - code-pulse-admin
  /api/code-pulse/admin/platform-funds:
    get:
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Page size
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Platform funds overview
      tags:
      - code-pulse-admin
  /api/code-pulse/admin/proposal-initiators:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: List proposal initiators
      tags:
      - code-pulse-admin
    post:
      consumes:
      - application/json
      parameters:
      - description: '{ address: string }'
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Add proposal initiator
      tags:
      - code-pulse-admin
  /api/code-pulse/admin/proposal-initiators/{address}:
    delete:
      parameters:
      - description: Wallet address
        in: path
        name: address
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Remove proposal initiator
      tags:
      - code-pulse-admin
  /api/code-pulse/admin/sync-status:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Sync status
      tags:
      - code-pulse-admin
  /api/code-pulse/campaigns:
    get:
      parameters:
      - description: Filter by state
        in: query
        name: state
        type: string
      - description: Filter by proposal_id
        in: query
        name: proposal_id
        type: integer
      - description: Filter by organizer address
        in: query
        name: organizer
        type: string
      - description: Filter by developer (joined)
        in: query
        name: developer
        type: string
      - description: Filter by contributor (joined)
        in: query
        name: contributor
        type: string
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Page size
        in: query
        name: page_size
        type: integer
      - description: 'Sort: launched_at_desc (default), deadline_at_asc'
        in: query
        name: sort
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: List campaigns
      tags:
      - code-pulse
  /api/code-pulse/campaigns/{campaignId}:
    get:
      parameters:
      - description: Campaign ID
        in: path
        name: campaignId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorJSON'
      summary: Campaign detail
      tags:
      - code-pulse
  /api/code-pulse/campaigns/{campaignId}/contributions:
    get:
      parameters:
      - description: Campaign ID
        in: path
        name: campaignId
        required: true
        type: integer
      - description: Filter by contributor address
        in: query
        name: contributor
        type: string
      - description: 'Sort: amount_desc (default), latest'
        in: query
        name: sort
        type: string
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Page size
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Campaign contributions
      tags:
      - code-pulse
  /api/code-pulse/campaigns/{campaignId}/timeline:
    get:
      parameters:
      - description: Campaign ID
        in: path
        name: campaignId
        required: true
        type: integer
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Page size
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Campaign timeline
      tags:
      - code-pulse
  /api/code-pulse/config:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Code Pulse config
      tags:
      - code-pulse
  /api/code-pulse/contributors/{address}/dashboard:
    get:
      parameters:
      - description: Wallet address
        in: path
        name: address
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Contributor dashboard
      tags:
      - code-pulse
  /api/code-pulse/developers/{address}/dashboard:
    get:
      parameters:
      - description: Wallet address
        in: path
        name: address
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Developer dashboard
      tags:
      - code-pulse
  /api/code-pulse/initiators/{address}/dashboard:
    get:
      parameters:
      - description: Wallet address
        in: path
        name: address
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Initiator dashboard
      tags:
      - code-pulse
  /api/code-pulse/proposals:
    get:
      parameters:
      - description: Filter by status
        in: query
        name: status
        type: string
      - description: Filter by organizer address
        in: query
        name: organizer
        type: string
      - description: Filter by round_review_state
        in: query
        name: review_state
        type: string
      - description: If true, only proposals waiting to enter fundraising (approved
          + round_review_approved, or approved with no round state and never launched)
        in: query
        name: waiting_launch_queue
        type: string
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Page size (default 20, max 100)
        in: query
        name: page_size
        type: integer
      - description: 'Sort: submitted_at_desc (default), submitted_at_asc'
        in: query
        name: sort
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: List proposals
      tags:
      - code-pulse
  /api/code-pulse/proposals/{proposalId}:
    get:
      parameters:
      - description: Proposal ID
        in: path
        name: proposalId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorJSON'
      summary: Proposal detail
      tags:
      - code-pulse
  /api/code-pulse/proposals/{proposalId}/timeline:
    get:
      parameters:
      - description: Proposal ID
        in: path
        name: proposalId
        required: true
        type: integer
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Page size
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Proposal timeline
      tags:
      - code-pulse
  /api/code-pulse/summary:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Code Pulse summary
      tags:
      - code-pulse
  /api/code-pulse/tx/{attemptId}:
    get:
      parameters:
      - description: Attempt ID
        in: path
        name: attemptId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorJSON'
      summary: Get transaction attempt
      tags:
      - code-pulse
  /api/code-pulse/tx/build:
    post:
      consumes:
      - application/json
      parameters:
      - description: Action + wallet + params
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/codepulse.TxBuildReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Build transaction calldata
      tags:
      - code-pulse
  /api/code-pulse/tx/submit:
    post:
      consumes:
      - application/json
      parameters:
      - description: Action + params
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/codepulse.TxBuildReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Submit transaction (server-signed)
      tags:
      - code-pulse
  /api/code-pulse/wallets/{address}/overview:
    get:
      parameters:
      - description: Wallet address (0x...)
        in: path
        name: address
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Wallet overview
      tags:
      - code-pulse
  /api/contract/counter/count:
    post:
      description: Sends an on-chain transaction calling `count()` using ETH_PRIVATE_KEY.
        Request has **no body**.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.CounterIncrementResp'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorJSON'
        "502":
          description: transaction send error
          schema:
            $ref: '#/definitions/handlers.ErrorJSON'
        "503":
          description: contract, RPC, or private key not configured
          schema:
            $ref: '#/definitions/handlers.ErrorJSON'
      summary: Counter increment (tx)
      tags:
      - contract
  /api/contract/counter/value:
    get:
      description: Reads `get()` from the configured counter contract (requires COUNTER_CONTRACT_ADDRESS
        and ETH_RPC_URL).
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.CounterValueResp'
        "502":
          description: RPC / contract call error
          schema:
            $ref: '#/definitions/handlers.ErrorJSON'
        "503":
          description: contract or RPC not configured
          schema:
            $ref: '#/definitions/handlers.ErrorJSON'
      summary: Counter current value
      tags:
      - contract
  /api/info:
    get:
      description: Returns API name and version string.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.APIInfoResp'
      summary: API info
      tags:
      - system
  /api/lending/borrows:
    get:
      description: PostgreSQL（RPC 扫块落库为权威）。
      parameters:
      - description: 默认 84532 或 LENDING_CHAIN_ID
        in: query
        name: chain_id
        type: integer
      - description: Pool 地址过滤
        in: query
        name: pool_address
        type: string
      - description: 用户地址过滤
        in: query
        name: user_address
        type: string
      - description: 页码，默认 1
        in: query
        name: page
        type: integer
      - description: 每页条数，默认 20，最大 100
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Borrow 事件列表
      tags:
      - lending
  /api/lending/chain-status:
    get:
      description: 使用 LENDING_ETH_RPC_URL 或 BASE_ETH_RPC_URL 建立的客户端，与 GET /api/chain/status（ETH_RPC_URL）完全隔离。
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "503":
          description: Service Unavailable
          schema:
            additionalProperties: true
            type: object
      summary: 借贷专用 RPC 连通性
      tags:
      - lending
  /api/lending/contracts:
    get:
      description: 读取 lending_contracts（006 种子 + 索引器可补充）。
      parameters:
      - description: EVM chain id，默认 84532（Base Sepolia）
        in: query
        name: chain_id
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: 借贷已登记合约
      tags:
      - lending
  /api/lending/liquidations:
    get:
      description: PostgreSQL（RPC 扫块落库为权威）。user_address 匹配 borrower 或 liquidator。
      parameters:
      - description: 默认 84532 或 LENDING_CHAIN_ID
        in: query
        name: chain_id
        type: integer
      - description: Pool 地址过滤
        in: query
        name: pool_address
        type: string
      - description: 借款人或清算人地址过滤
        in: query
        name: user_address
        type: string
      - description: 页码，默认 1
        in: query
        name: page
        type: integer
